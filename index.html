<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>UMORIA — The Dungeons of Moria</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <style>
    /* --- engine styles: needed so the engine builds & measures its DOM --- */
    html, body { height: 100%; }
    body { margin: 0; overflow: hidden; background: #000; color: #fff;
           display: grid; justify-content: center; align-content: center;
           font-family: monospace; font-size: 22.5px; }
    #cursor { position: absolute; width: 1ch; background-color: #fff; color: #000;
              animation-name: blink; animation-duration: 1.25s; animation-iteration-count: 9; }
    @keyframes blink { 0%,49% { background-color:#fff; color:#000; } 50%,100% { background-color:#000; color:#fff; } }
    /* keep the engine screen laid out (for measurements) but invisible */
    #screen { position: fixed !important; left: -100000px !important; top: 0 !important;
              opacity: 0 !important; pointer-events: none !important; }
    #terminal { display: none !important; width: 80ch; }
    /* --- shell styles --- */
    #bezel { padding: 26px; border-radius: 28px;
             background: linear-gradient(145deg, #2b2b30, #0e0e10);
             box-shadow: 0 10px 70px #000, inset 0 0 22px rgba(0,0,0,.95); }
    #crt { display: block; border-radius: 16px; background: #000; }
    #hint { position: fixed; left: 0; right: 0; bottom: 7px; text-align: center;
            color: #75757f; font: 13px/1.4 monospace; pointer-events: none; }
    #gear { position: fixed; top: 10px; right: 16px; color: #8a8a93; font: 20px monospace;
            cursor: pointer; user-select: none; z-index: 5; }
    #gear:hover { color: #d0d0d8; }
    #reload { position: fixed; top: 10px; right: 50px; color: #8a8a93; font: 20px monospace;
              cursor: pointer; user-select: none; z-index: 5; }
    #reload:hover { color: #d0d0d8; }
    body.fs #reload { display: none; }
    body.light { background: #a8a193; }
    body.light #bezel { background: linear-gradient(145deg, #d9d3c5, #b1aa9c);
                        box-shadow: 0 10px 50px rgba(0,0,0,.35), inset 0 0 16px rgba(0,0,0,.25); }
    body.light #crt { background: #e9e2d0; }
    body.light #hint { color: #5a5446; }
    body.fs #bezel { padding: 0; border-radius: 0; box-shadow: none; background: #000; }
    body.fs.light #bezel { background: #e9e2d0; }
    body.fs #crt { border-radius: 0; }
    body.fs #hint, body.fs #gear { display: none; }
  </style>
</head>
<body>
  <div id="bezel"><canvas id="crt" width="800" height="480"></canvas></div>
  <div id="reload" title="Reload / continue your saved game">⟳</div>
  <div id="gear" title="Options (F1)">⚙</div>
  <div id="hint">F1 Options · F2 Phosphor · F3 Display · F4 Music · F11 Fullscreen — everything else is the real Umoria (press ? in game)</div>
  <script src="engine/umoria.min.js?v=1781297191897"></script>
  <script src="js/settings.js?v=1781297191897"></script>
  <script src="js/terminal.js?v=1781297191897"></script>
  <script src="js/crt.js?v=1781297191897"></script>
  <script src="js/audio.js?v=1781297191897"></script>
  <script src="js/bridge.js?v=1781297191897"></script>
</body>
</html>
