<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>UMORIA &mdash; The Dungeons of Moria</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; height: 100%; background: #070708; overflow: hidden; }
  body {
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, #18181c 0%, #060607 75%);
  }
  #bezel {
    padding: 28px; border-radius: 30px;
    background: linear-gradient(145deg, #2b2b30, #0e0e10);
    box-shadow: 0 10px 70px #000, inset 0 0 22px rgba(0,0,0,.95);
  }
  #screen { display: block; border-radius: 16px; background: #000; }

  /* light theme: for playing in a bright room */
  body.light { background: radial-gradient(ellipse at center, #cfc9bb 0%, #a8a193 75%); }
  body.light #bezel {
    background: linear-gradient(145deg, #d9d3c5, #b1aa9c);
    box-shadow: 0 10px 50px rgba(0,0,0,.35), inset 0 0 16px rgba(0,0,0,.25);
  }
  body.light #screen { background: #e9e2d0; }

  /* fullscreen: nothing but the picture */
  body.fs #bezel { padding: 0; border-radius: 0; box-shadow: none; background: #000; }
  body.fs.light #bezel { background: #e9e2d0; }
  body.fs #screen { border-radius: 0; }
</style>
</head>
<body>
<div id="bezel"><canvas id="screen"></canvas></div>
<script src="js/util.js"></script>
<script src="js/settings.js"></script>
<script src="js/terminal.js"></script>
<script src="js/crt.js"></script>
<script src="js/audio.js"></script>
<script src="js/data.js"></script>
<script src="js/dungeon.js"></script>
<script src="js/game.js"></script>
<script src="js/main.js"></script>
</body>
</html>
