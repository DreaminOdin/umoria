<style>
  html, body { margin: 0; height: 100%; background: #070708; overflow: hidden; }

    display: flex; align-items: center; justify-content: center;

  }
  #screen { display: block; border-radius: 16px; background: #000; }
</style>

<div id="bezel"><canvas id="screen"></canvas></div>
